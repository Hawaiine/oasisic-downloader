# =============================================================================
# Oasisic Downloader — Docker 自动构建
# 每次推送 main 分支自动构建并推送到 Docker Hub
# =============================================================================
# 首次使用前需要在 GitHub 仓库设置 Secrets：
#   DOCKERHUB_USERNAME: barryallen26
#   DOCKERHUB_TOKEN:    你的 Docker Hub Access Token（非密码）
#
# 生成 Token: https://hub.docker.com/settings/security → New Access Token
# 添加 Secret: https://github.com/Hawaiine/oasisic-downloader/settings/secrets/actions
# =============================================================================

name: 🐳 Build & Push to Docker Hub

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - ".gitignore"
      - "install.sh"
      - "ecosystem.config.js"

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/oasisic-downloader
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,format=short

      - name: 🐳 Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
