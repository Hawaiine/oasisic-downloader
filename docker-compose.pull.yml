# =============================================================================
# Oasisic Downloader — 从 Docker Hub 拉取（免构建，适用于生产环境）
# =============================================================================
# 启动: docker compose -f docker-compose.pull.yml up -d
# 更新: docker compose -f docker-compose.pull.yml pull
# =============================================================================

services:
  oasisic:
    image: barryallen26/oasisic-downloader:latest
    container_name: oasisic-downloader
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production

      # ── Spotify（可选）────────────────────────────────────────────────
      # - SPOTIFY_CLIENT_ID=your_client_id
      # - SPOTIFY_CLIENT_SECRET=your_client_secret

      # ── Apple Music（可选）────────────────────────────────────────────
      # - APPLE_MUSIC_TOKEN=your_token

      # ── 时区 / 代理（可选）────────────────────────────────────────────
      # - TZ=Asia/Shanghai
      # - HTTP_PROXY=http://...
      # - HTTPS_PROXY=http://...

    volumes:
      - ./downloads:/app/downloads
      - ./tmp:/app/tmp
      - ./logs:/app/logs
      # - ./cookies.txt:/app/server/cookies.txt:ro
      # - ./.env:/app/server/.env:ro

    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M